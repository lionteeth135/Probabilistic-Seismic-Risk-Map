<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>區域地震易損性評估展示</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="buildings_data.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        .popup-content {
            text-align: center;
            min-width: 350px;
        }
        .popup-img {
            width: 100%; 
            height: auto;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        select {
            padding: 5px;
            font-size: 14px;
            margin: 5px 0;
            width: 80%;
            cursor: pointer;
        }
        /* 自訂圖層控制面板的字體大小 */
        .leaflet-control-layers {
            font-size: 14px;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 初始化地圖
        var map = L.map('map').setView([23.993, 121.601], 14);

        // 底圖圖層
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 【新增】建立兩個獨立的圖層群組
        var dataLayer = L.layerGroup();   // 放有資料的建築
        var noDataLayer = L.layerGroup(); // 放無資料的建築

        buildings.forEach(function(b) {
            if (b.has_data) {
                // === 有資料的建築：使用預設圖釘，並加入圖表選單 ===
                var defaultImg = `${b.id}/${b.id}_Slight_fragility.png`;
                var popupHTML = `
                    <div class="popup-content">
                        <h3 style="margin-bottom: 5px;">建築編號: ${b.id}</h3>
                        <p style="margin: 0 0 10px 0; color: green; font-weight: bold;">已完成易損性評估</p>
                        <select onchange="changeDamageState('${b.id}', this.value)">
                            <option value="Slight">Slight (輕微損傷)</option>
                            <option value="Moderate">Moderate (中度損傷)</option>
                            <option value="Extensive">Extensive (嚴重損傷)</option>
                            <option value="Complete">Complete (完全倒塌)</option>
                        </select>
                        <img id="img-${b.id}" src="${defaultImg}" class="popup-img" alt="Fragility Curve" onerror="this.onerror=null; this.src=''; this.alt='找不到對應的圖片檔案';">
                    </div>
                `;
                var marker = L.marker([b.lat, b.lng]).bindPopup(popupHTML, { maxWidth: 500 });
                dataLayer.addLayer(marker); 
            } else {
                // === 無資料的建築：使用灰色小圓點，避免地圖太雜亂 ===
                var circleOptions = {
                    radius: 4,           // 圓點大小
                    fillColor: "#888",   // 填滿顏色(灰色)
                    color: "#555",       // 邊框顏色
                    weight: 1,           // 邊框粗細
                    opacity: 1,
                    fillOpacity: 0.6     // 透明度
                };
                var popupHTML = `
                    <div style="text-align: center;">
                        <h4 style="margin: 5px 0;">建築編號: ${b.id}</h4>
                        <p style="margin: 0; color: gray;">尚未具備易損性分析資料</p>
                    </div>
                `;
                var circle = L.circleMarker([b.lat, b.lng], circleOptions).bindPopup(popupHTML);
                noDataLayer.addLayer(circle);
            }
        });

        // 將兩個圖層都預設加到地圖上顯示
        noDataLayer.addTo(map);
        dataLayer.addTo(map);

        // 【新增】在地圖右上角加入圖層控制面板
        var overlayMaps = {
            "🟢 已分析建築 (顯示圖表)": dataLayer,
            "⚪ 未分析建築 (僅標示位置)": noDataLayer
        };
        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

        // 定義切換圖片的函數
        function changeDamageState(buildingId, ds) {
            var newImgPath = `${buildingId}/${buildingId}_${ds}_fragility.png`;
            document.getElementById(`img-${buildingId}`).src = newImgPath;
        }
    </script>
</body>
</html>
